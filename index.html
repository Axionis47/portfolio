<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Siddharth Yalamanchili — Machine Learning Engineer</title>
    <meta name="description" content="Machine learning engineer — classical models and LLM systems. Credit risk, computer vision, recommendations, distillation, and LLM agents.">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=Source+Serif+4:ital,opsz,wght@0,8..60,300;0,8..60,400;0,8..60,500;1,8..60,300;1,8..60,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">

    <!-- Design system: single source of truth, then shared primitives -->
    <link rel="stylesheet" href="styles/tokens.css">
    <link rel="stylesheet" href="styles/base.css">

    <style>
        /* ── Global chrome: the fixed topbar (owned by the shell) ── */
        .topbar{
            position:fixed;top:0;left:0;right:0;z-index:var(--z-nav);
            padding:20px var(--gutter);
            display:flex;justify-content:space-between;align-items:center;
            background:rgba(16,16,18,0.55);
            backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
            border-bottom:1px solid rgba(255,255,255,0.04);
        }
        .topbar .nl{font-family:var(--mono);font-size:.96rem;font-weight:600;color:var(--t1)}
        .topbar .nl span{color:var(--accent)}
        .top-links{display:flex;gap:20px}
        .top-links a{font-family:var(--mono);font-size:.76rem;font-weight:500;color:var(--t2);transition:color var(--dur-fast) var(--ease-out)}
        .top-links a:hover{color:var(--accent)}
        @media(max-width:560px){ .top-links a:not(.contact){display:none} }

        /* ── Scroll-spy sidenav (global chrome) ── */
        .sidenav{
            position:fixed;left:26px;top:50%;transform:translateY(-50%);z-index:var(--z-nav);
            display:flex;flex-direction:column;gap:20px;
        }
        .sidenav a{display:flex;align-items:center;gap:13px;color:var(--t3);transition:color var(--dur-fast) var(--ease-out)}
        .sidenav a:hover{color:var(--t1)}
        .sidenav a.active{color:var(--accent)}
        .sidenav .sdot{width:9px;height:9px;border-radius:50%;background:currentColor;opacity:.5;transition:all var(--dur-fast) var(--ease-out);flex-shrink:0}
        .sidenav a.active .sdot{opacity:1;box-shadow:0 0 12px var(--accent)}
        .sidenav .slabel{font-family:var(--mono);font-size:.7rem;font-weight:500;letter-spacing:.02em;
            opacity:0;transform:translateX(-6px);transition:all var(--dur-fast) var(--ease-out);white-space:nowrap}
        .sidenav a:hover .slabel,.sidenav a.active .slabel{opacity:1;transform:translateX(0)}
        @media(max-width:900px){ .sidenav{display:none} }
    </style>
</head>
<body>

    <!-- The argument, behind everything: gravity as constraint, orbits as bounded autonomy -->
    <canvas id="cosmos"></canvas>

    <header class="topbar">
        <div class="nl">sai<span>.</span></div>
        <nav class="top-links">
            <a href="https://github.com/Axionis47" target="_blank" rel="noopener">GitHub</a>
            <a href="https://www.linkedin.com/in/siddharth-yalamanchili/" target="_blank" rel="noopener">LinkedIn</a>
            <a href="assets/resume.pdf" target="_blank" rel="noopener">Resume</a>
            <a href="mailto:sidsy04@gmail.com" class="contact">Contact</a>
        </nav>
    </header>

    <nav class="sidenav" aria-label="Section navigation">
        <a href="#flagship" data-target="flagship"><span class="sdot"></span><span class="slabel">Project</span></a>
        <a href="#work" data-target="work"><span class="sdot"></span><span class="slabel">Work</span></a>
        <a href="#notes" data-target="notes"><span class="sdot"></span><span class="slabel">Notes</span></a>
        <a href="#experience" data-target="experience"><span class="sdot"></span><span class="slabel">Experience</span></a>
        <a href="#contact" data-target="contact"><span class="sdot"></span><span class="slabel">Contact</span></a>
    </nav>

    <!-- Modular sections auto-mount here, in the order defined by SECTIONS in app.js. -->
    <main id="app"></main>

    <!-- ── Animation platform (CDN) ── -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@studio-freight/lenis@1.0.42/dist/lenis.min.js"></script>

    <!-- ── Our modules: sim, choreography, then the boot orchestrator ── -->
    <script src="scripts/cosmos.js"></script>
    <script src="scripts/story.js"></script>
    <script src="scripts/app.js"></script>
</body>
</html>
